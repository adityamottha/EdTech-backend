services:
  mongodb:
    image: mongo:latest
    container_name: edtech-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - edtech-network

  backend:
    build: .
    container_name: edtech-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8000
      MONGODB_URI: mongodb://mongodb:27017
      NODEMON_LEGACY_WATCH: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - edtech-network

networks:
  edtech-network:
    driver: bridge

volumes:
  mongodb_data: